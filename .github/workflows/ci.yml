name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate shell kit
        run: |
          bash test/runtests.sh
          bash scripts/generate_site.sh
          bash scripts/smoke_check.sh
          bash scripts/render_readme_assets.sh

